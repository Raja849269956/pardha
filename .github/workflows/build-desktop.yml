name: Build Desktop Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop dependencies
        run: cd desktop && npm install

      - name: Create production .env
        run: |
          cd desktop
          echo "REACT_APP_API_URL=https://interview-copilot-vlvm.onrender.com" > .env
          echo "REACT_APP_WS_URL=wss://interview-copilot-vlvm.onrender.com" >> .env

      - name: Build renderer bundle
        run: cd desktop && npm run build

      - name: Build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: cd desktop && npx electron-builder --${{ matrix.os == 'macos-latest' && 'mac' || 'win' }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: desktop/dist/*
